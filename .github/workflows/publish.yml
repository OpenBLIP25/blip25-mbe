name: Publish

# Publishes `blip25-mbe` to crates.io when a version tag is pushed.
#
# Release flow:
#   1. Bump the version in the workspace `Cargo.toml` and CHANGELOG, commit to main.
#   2. Tag the release commit: `git tag -a vX.Y.Z -m "…" && git push origin vX.Y.Z`.
#   3. This workflow builds, tests, and runs `cargo publish` for that version.
#
# The published version is whatever `Cargo.toml` says at the tagged commit — the
# tag name is for the git side. A mismatch (tag vX.Y.Z but Cargo.toml ≠ X.Y.Z)
# fails the guard below before anything is uploaded.
#
# Requires repo secret CARGO_REGISTRY_TOKEN (Settings → Secrets → Actions),
# a crates.io API token scoped to publish-update for an owner of the crate.

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: cargo publish blip25-mbe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c "import sys,json;print(next(p['version'] for p in json.load(sys.stdin)['packages'] if p['name']=='blip25-mbe'))")
          echo "tag=$tag  crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match blip25-mbe version $crate"
            exit 1
          fi

      - name: Build + test
        run: cargo test --workspace --release

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p blip25-mbe
